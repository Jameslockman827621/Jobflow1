<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
    }
    
    .header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      padding: 16px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }
    
    .content {
      padding: 16px;
    }
    
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }
    
    .status.logged-in {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
    }
    
    .status.logged-out {
      background: #fef3c7;
      border: 1px solid #fde68a;
      color: #92400e;
    }
    
    .job-detected {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e40af;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .job-detected h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .job-detected p {
      font-size: 12px;
      color: #6b7280;
    }
    
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    
    .btn-primary:hover {
      background: #1d4ed8;
    }
    
    .btn-secondary {
      background: white;
      border: 1px solid #d1d5db;
      color: #374151;
    }
    
    .btn-secondary:hover {
      background: #f9fafb;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }
    
    .stat {
      text-align: center;
    }
    
    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
    }
    
    .stat-label {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }
    
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 JobScale</h1>
    <p>AI-Powered Job Applications</p>
  </div>
  
  <div class="content">
    <div id="loading" class="loading">
      <div class="spinner"></div>
    </div>
    
    <div id="logged-out" class="hidden">
      <div class="status logged-out">
        ⚠️ Not logged in
      </div>
      <button id="login-btn" class="btn btn-primary">
        Sign In to JobScale
      </button>
    </div>
    
    <div id="logged-in" class="hidden">
      <div class="status logged-in">
        ✓ Logged in as <strong id="user-email"></strong>
      </div>
      
      <div id="job-detected" class="job-detected hidden">
        <h3>📋 Job Detected</h3>
        <p id="job-info">Loading job details...</p>
      </div>
      
      <button id="apply-btn" class="btn btn-primary hidden">
        ✨ Apply with AI
      </button>

      <div id="ready-section" class="hidden" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;margin-bottom:12px;">
        <p style="font-size:13px;color:#166534;margin-bottom:8px;font-weight:600;">🚀 <span id="ready-count">0</span> jobs ready to auto-apply</p>
        <button id="auto-apply-btn" class="btn btn-primary" style="background:#14b8a6;">
          Auto-Apply to Selected Jobs
        </button>
      </div>

      <button id="dashboard-btn" class="btn btn-secondary">
        📊 View Dashboard
      </button>
      
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="stat-applied">0</div>
          <div class="stat-label">Applied</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-interviews">0</div>
          <div class="stat-label">Interviews</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-offers">0</div>
          <div class="stat-label">Offers</div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
