<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      max-height: 520px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
    }
    .header {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      padding: 14px 16px;
      text-align: center;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header p { font-size: 12px; opacity: 0.9; margin-top: 4px; }
    .content { padding: 12px 16px; }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status.logged-in { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .status.logged-out { background: #fef3c7; border: 1px solid #fde68a; color: #92400e; }
    .jobs-section { margin-bottom: 12px; }
    .jobs-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .jobs-header h3 { font-size: 14px; font-weight: 600; color: #1f2937; }
    .jobs-list {
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #f9fafb;
    }
    .job-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid #e5e7eb;
      cursor: pointer;
    }
    .job-item:last-child { border-bottom: none; }
    .job-item:hover { background: #f3f4f6; }
    .job-item input { margin-top: 2px; flex-shrink: 0; cursor: pointer; }
    .job-item label { cursor: pointer; flex: 1; }
    .job-item .title { font-size: 13px; font-weight: 500; color: #111827; }
    .job-item .company { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
    }
    .btn-primary { background: linear-gradient(135deg, #0d9488, #0f766e); color: white; }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary { background: white; border: 1px solid #d1d5db; color: #374151; }
    .btn-secondary:hover { background: #f9fafb; }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
    .stat { text-align: center; }
    .stat-value { font-size: 16px; font-weight: 600; color: #1f2937; }
    .stat-label { font-size: 11px; color: #6b7280; margin-top: 2px; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 24px; }
    .spinner { width: 24px; height: 24px; border: 2px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
    .empty-state { padding: 20px; text-align: center; color: #6b7280; font-size: 13px; }
    .select-all { font-size: 12px; color: #2563eb; cursor: pointer; }
    .select-all:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🚀 JobScale</h1>
    <p>Select jobs → Click Apply → Auto-opens all</p>
  </div>

  <div class="content">
    <div id="loading" class="loading">
      <div class="spinner"></div>
    </div>

    <div id="logged-out" class="hidden">
      <div class="status logged-out">⚠️ Not logged in</div>
      <button id="login-btn" class="btn btn-primary">Sign In to JobScale</button>
    </div>

    <div id="logged-in" class="hidden">
      <div class="status logged-in">✓ Logged in as <strong id="user-email"></strong></div>

      <div class="jobs-section">
        <div class="jobs-header">
          <h3>Select jobs to apply</h3>
          <span id="select-all" class="select-all">Select all</span>
        </div>
        <div id="jobs-list" class="jobs-list">
          <div class="empty-state">Loading jobs...</div>
        </div>
      </div>

      <button id="apply-btn" class="btn btn-primary">
        ✨ Apply to Selected Jobs
      </button>
      <button id="dashboard-btn" class="btn btn-secondary">📊 Open Dashboard</button>

      <div class="stats">
        <div class="stat"><div class="stat-value" id="stat-applied">0</div><div class="stat-label">Applied</div></div>
        <div class="stat"><div class="stat-value" id="stat-interviews">0</div><div class="stat-label">Interviews</div></div>
        <div class="stat"><div class="stat-value" id="stat-offers">0</div><div class="stat-label">Offers</div></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
